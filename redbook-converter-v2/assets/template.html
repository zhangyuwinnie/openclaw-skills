<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  
  body {
    margin: 0;
    padding: 0;
    background-color: #f5f5f7;
    font-family: 'Noto Sans SC', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 50px;
    padding-top: 50px;
    padding-bottom: 50px;
  }

  .slide {
    width: 1080px;
    height: 1440px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 80px;
    box-sizing: border-box;
    border-radius: 40px;
  }

  h1 {
    font-size: 96px;
    line-height: 1.2;
    color: #ff2e4d;
    margin-bottom: 40px;
    font-weight: 900;
  }

  h2 {
    font-size: 72px;
    color: #333;
    margin-bottom: 30px;
    border-left: 15px solid #ff2e4d;
    padding-left: 30px;
  }

  p, li {
    font-size: 48px;
    line-height: 1.6;
    color: #555;
    margin-bottom: 30px;
  }

  strong {
    color: #000;
    background: linear-gradient(120deg, #ffdde1 0%, #ee9ca7 100%);
    padding: 0 10px;
    border-radius: 8px;
  }

  pre {
    background: #282c34;
    color: #abb2bf;
    padding: 40px;
    border-radius: 20px;
    font-size: 36px;
    overflow-x: hidden;
    white-space: pre-wrap;
    font-family: monospace;
    margin: 40px 0;
  }
  
  .number-badge {
    background: #ff2e4d;
    color: white;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: bold;
    margin-right: 20px;
    vertical-align: middle;
  }

  .footer {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    border-top: 4px solid #eee;
    padding-top: 40px;
    display: flex;
    justify-content: space-between;
    font-size: 36px;
    color: #999;
  }

  .highlight-box {
    background: #fff5f5;
    border: 4px dashed #ff2e4d;
    border-radius: 30px;
    padding: 40px;
    margin-top: 40px;
  }

  /* Specific Slide Styles */
  #slide1 {
    background: linear-gradient(135deg, #fff 0%, #fff0f2 100%);
    justify-content: center;
    text-align: center;
  }
  #slide1 h1 {
    font-size: 120px;
    margin-bottom: 60px;
  }
  #slide1 p {
    font-size: 56px;
  }
  
  .emoji-bg {
    display: none !important;
  }

  .content-wrapper {
    z-index: 1;
  }

</style>
</head>
<body>

  <!-- Slide 1: Cover -->
  <div class="slide" id="slide1">
    <div class="emoji-bg">🚀</div>
    <div class="content-wrapper">
      <h1>Title<br>Subtitle</h1>
      <p>Hook Line</p>
      <p style="font-size: 42px; color: #888; margin-top: 100px;">Tag1 · Tag2 · Tag3</p>
    </div>
    <div class="footer">
      <span>@OpenClaw</span>
      <span>1/3</span>
    </div>
  </div>

  <!-- Slide 2: Content -->
  <div class="slide">
    <div class="emoji-bg">💡</div>
    <div class="content-wrapper">
      <h2><span class="number-badge">1</span>Point One</h2>
      <p>Explanation here.</p>
    </div>
    <div class="footer">
      <span>@OpenClaw</span>
      <span>2/3</span>
    </div>
  </div>

  <!-- Slide 3: Summary -->
  <div class="slide">
    <div class="emoji-bg">🎉</div>
    <div class="content-wrapper">
      <h2>Summary</h2>
      <ul>
        <li>Point 1</li>
        <li>Point 2</li>
      </ul>
      <div class="highlight-box">
        <p>Call to action!</p>
      </div>
    </div>
    <div class="footer">
      <span>@OpenClaw</span>
      <span>3/3</span>
    </div>
  </div>

</body>
</html>
