<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1440, initial-scale=1.0" />
<title>Redbook Minimal Card Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap');

  :root {
    --bg: #faf9f6;
    --card: #ffffff;
    --text-main: #343434;
    --text-sub: #6b6b6b;
    --text-muted: #be9f95;
    --accent: #e88374;

    --outer-padding: 44px;
    --card-padding-x: 84px;
    --card-padding-y: 76px;
    --card-radius: 24px;
    --card-border: rgb(238, 235, 231);
    --card-shadow: 0 2px 10px rgba(0, 0, 0, 0.035);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 40px 0;
    background: #ffffff;
    font-family: 'Noto Sans SC', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .slide {
    width: 1080px;
    height: 1440px;
    background: var(--bg);
    border-radius: 24px;
    padding: var(--outer-padding);
    position: relative;
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: var(--card-padding-y) var(--card-padding-x);
    position: relative;
  }

  .title {
    color: var(--text-main);
    font-size: 82px;
    line-height: 1.22;
    font-weight: 900;
    letter-spacing: 0.2px;
    margin: 0;
    max-width: 860px;
  }

  .emphasis {
    margin-top: 40px;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .emphasis-char {
    color: var(--text-main);
    font-size: 56px;
    line-height: 1;
    font-weight: 700;
  }

  .emphasis-line {
    width: 74px;
    height: 6px;
    border-radius: 6px;
    background: var(--accent);
  }

  .subtitle {
    position: absolute;
    left: var(--card-padding-x);
    right: 210px;
    bottom: 102px;
    color: var(--text-sub);
    font-size: 56px;
    line-height: 1.3;
    font-weight: 700;
    margin: 0;
  }

  .icon {
    position: absolute;
    right: var(--card-padding-x);
    bottom: 184px;
    width: 146px;
    height: 146px;
    object-fit: contain;
  }

  .icon.placeholder {
    border: 1px dashed #d8d8dc;
    border-radius: 16px;
    color: #b8b8be;
    font-size: 20px;
    display: none;
    align-items: center;
    justify-content: center;
    background: #fafafc;
  }

  .footer {
    position: absolute;
    left: var(--card-padding-x);
    right: var(--card-padding-x);
    bottom: 40px;
    border-top: 2px solid #faeee5;
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    color: var(--text-muted);
    font-size: 34px;
    line-height: 1;
  }

  /* Content slide */
  .section-title {
    color: var(--text-main);
    font-size: 58px;
    line-height: 1.25;
    font-weight: 800;
    margin: 0 0 24px 0;
  }

  .bullets {
    margin: 0;
    padding-left: 38px;
    color: var(--text-sub);
  }

  .bullets li {
    margin-bottom: 20px;
    font-size: 42px;
    line-height: 1.45;
  }

  .bullets li::marker {
    color: var(--accent);
  }

  .keyword {
    color: #c59d95;
    background: #fcf3ee;
    border-radius: 10px;
    padding: 2px 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
    font-size: 0.9em;
  }
</style>
</head>
<body>

  <!-- Slide 1: Minimal-card cover -->
  <div class="slide" id="slide1">
    <div class="card">
      <h1 class="title">AI写的UI太丑？</h1>

      <div class="emphasis">
        <span class="emphasis-char">丑</span>
        <span class="emphasis-line"></span>
      </div>

      <!-- icon optional: keep removed by default for cleaner minimal-card -->

      <p class="subtitle">impeccable Skill救了我</p>

      <div class="footer">
        <span>@Dayu · R2</span>
        <span>1/2</span>
      </div>
    </div>
  </div>

  <!-- Slide 2: Minimal-card content -->
  <div class="slide" id="slide2">
    <div class="card">
      <h2 class="section-title">适配类</h2>
      <ul class="bullets">
        <li><span class="keyword">/clarify</span> 改善文案和提示，让界面更易懂</li>
        <li><span class="keyword">/distill</span> 去除多余复杂性，简化到本质</li>
        <li><span class="keyword">/adapt</span> 适配不同屏幕和设备</li>
      </ul>

      <h2 class="section-title" style="margin-top: 34px;">增强类</h2>
      <ul class="bullets">
        <li><span class="keyword">/animate</span> 添加微交互和动效</li>
        <li><span class="keyword">/colorize</span> 添加策略性配色，让整体更协调</li>
      </ul>

      <div class="footer">
        <span>@Dayu · R2</span>
        <span>2/2</span>
      </div>
    </div>
  </div>

</body>
</html>
